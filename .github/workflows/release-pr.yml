name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
      preid:
        description: "Prerelease identifier used for pre* bumps and the npm dist-tag"
        required: false
        default: "next"
        type: string

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump package versions
        env:
          BUMP: ${{ inputs.bump }}
          PREID: ${{ inputs.preid }}
        run: |
          if [[ "$BUMP" == pre* || "$BUMP" == "prerelease" ]]; then
            if [[ ! "$PREID" =~ ^[A-Za-z][0-9A-Za-z-]*$ ]]; then
              echo "::error::preid must start with a letter and contain only letters, numbers, and hyphens"
              exit 1
            fi
          fi

          VERSION="$(node scripts/version-packages.mjs "$BUMP" "$PREID")"
          pnpm install --lockfile-only
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get new version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          BRANCH="release/$TAG"
          PRERELEASE="false"
          NPM_TAG="latest"

          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="true"
            PRERELEASE_PART="${VERSION#*-}"
            NPM_TAG="${PRERELEASE_PART%%.*}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TODAY=$(date +%Y-%m-%d)

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Generating changelog from $PREVIOUS_TAG to HEAD"
            COMMITS=$(git log --pretty=format:"- %s" "$PREVIOUS_TAG"..HEAD --no-merges | grep -v "^- chore: release" || true)
          else
            echo "No previous tag found, generating full changelog"
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v "^- chore: release" || true)
          fi

          {
            echo "## [$VERSION] - $TODAY"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- Initial release"
            fi
            echo ""
          } > new_section.txt

          cat new_section.txt

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            head -n 4 CHANGELOG.md > CHANGELOG.new.md
            echo "" >> CHANGELOG.new.md
            cat new_section.txt >> CHANGELOG.new.md
            tail -n +5 CHANGELOG.md >> CHANGELOG.new.md
            mv CHANGELOG.new.md CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              cat new_section.txt
            } > CHANGELOG.md
          fi

          rm new_section.txt
          cat CHANGELOG.md

      - name: Create release branch and push
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BRANCH="${{ steps.version.outputs.branch }}"

          git checkout -b "$BRANCH"
          git add package.json pnpm-lock.yaml CHANGELOG.md packages/*/package.json
          git commit -m "chore: release $TAG"
          git push --force origin "$BRANCH"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
          NPM_TAG: ${{ steps.version.outputs.npm_tag }}
        run: |
          gh label create release \
            --description "Release preparation PRs" \
            --color "0e8a16" \
            --force

          TITLE="Release $TAG"
          if [[ "$PRERELEASE" == "true" ]]; then
            TITLE="Prerelease $TAG"
          fi

          cat > pr_body.md <<EOF
          ## Release $TAG

          This PR prepares version $VERSION for all public packages.

          ### Changes
          - Updated package versions to $VERSION
          - Updated CHANGELOG.md with changes since last release

          ### After Merge
          When this PR is merged, the release workflow will publish to npm with the \`$NPM_TAG\` dist-tag and create a GitHub Release.

          GitHub prerelease: \`$PRERELEASE\`
          EOF

          gh pr create \
            --title "$TITLE" \
            --body-file pr_body.md \
            --label "release" \
            --base main
